<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Cart | The Juice Theory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #111;
      color: white;
      padding-bottom: 50px;
      background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url("checkout.jpg");
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-position: center;
      min-height: 100vh;
    }

    #top {
      padding: 15px 20px;
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 4px solid #507d2a;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    #top img { width: 120px; }

    .checkout-container {
      max-width: 800px;
      margin: 20px auto;
      background: rgba(34, 34, 34, 0.95);
      padding: 25px;
      border-radius: 15px;
      width: 90%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 { border-bottom: 2px solid #507d2a; padding-bottom: 10px; font-size: 1.8rem; margin-top: 0; color: white; }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid #444;
      gap: 10px;
    }

    .item-info h3 { margin: 0; font-size: 1.1rem; }
    .item-info p { margin: 5px 0 0; color: #8db600; font-weight: bold; }

    .quantity-controls {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .btn-qty {
      background: #444;
      color: white;
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn-qty:hover { background: #507d2a; }

    .total-section {
      margin-top: 30px;
      text-align: right;
      font-size: 1.5rem;
      color: #8db600;
    }

    .btn-order {
      background: linear-gradient(135deg, #507d2a, #8db600);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 30px;
      font-size: 1.1rem;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      margin-top: 20px;
      transition: 0.3s;
    }

    .btn-order:hover { opacity: 0.9; transform: translateY(-2px); }

    /* Modal Overlay */
    #payment-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-box {
      background: #222;
      padding: 30px;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      border: 1px solid #507d2a;
    }

    .pay-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #333;
      border-radius: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .pay-option:hover { background: #444; }

    @media (max-width: 500px) {
      .cart-item { flex-direction: column; align-items: flex-start; }
      .quantity-controls { width: 100%; justify-content: space-between; }
    }
  </style>
</head>
<body>

<div id="top">
  <img src="logo1.png" alt="Logo">
  <a href="index.html" style="color: #507d2a; text-decoration: none; font-weight: bold;">← Back to Shop</a>
</div>

<div class="checkout-container">
  <h1>Your Order</h1>
  
  <div id="cart-list"></div>

  <div id="empty-msg" style="text-align:center; display:none; padding: 40px 0;">
    <h3>Your cart is empty!</h3>
    <a href="index.html" style="color: #8db600; text-decoration:none; font-weight:bold;">Browse our juices</a>
  </div>

  <div class="total-section">
    <strong>Total: ₹<span id="grand-total">0</span></strong>
  </div>

  <button class="btn-order" onclick="placeOrder()">Place Order</button>
</div>

<div id="payment-modal">
  <div class="modal-box">
    <h2 style="color:#8db600; margin-top:0; border-bottom: 1px solid #444; padding-bottom: 10px;">Payment Method</h2>
    
    <div style="margin: 20px 0;">
      <label class="pay-option">
        <input type="radio" name="pay-method" value="Cash on Delivery" checked> Cash on Delivery
      </label>
      <label class="pay-option">
        <input type="radio" name="pay-method" value="Credit Card"> Credit Card
      </label>
      <label class="pay-option">
        <input type="radio" name="pay-method" value="Debit Card"> Debit Card
      </label>
      <label class="pay-option">
        <input type="radio" name="pay-method" value="UPI"> UPI / Online Payment
      </label>
    </div>

    <div style="display:flex; gap:10px; margin-top:20px;">
      <button onclick="closePayment()" style="flex:1; padding:12px; background:#444; color:white; border:none; border-radius:25px; cursor:pointer;">Cancel</button>
      <button onclick="confirmFinalOrder()" style="flex:1; padding:12px; background:#507d2a; color:white; border:none; border-radius:25px; font-weight:bold; cursor:pointer;">Confirm</button>
    </div>
  </div>
</div>

<script>
  // --- 1. DISPLAY CART ---
  function renderCart() {
    let cart = JSON.parse(localStorage.getItem('juiceCart')) || [];
    const listDiv = document.getElementById('cart-list');
    const emptyMsg = document.getElementById('empty-msg');
    const totalSpan = document.getElementById('grand-total');
    
    listDiv.innerHTML = '';
    let grandTotal = 0;

    if (cart.length === 0) {
      emptyMsg.style.display = 'block';
      totalSpan.innerText = '0';
      return;
    }

    emptyMsg.style.display = 'none';

    cart.forEach((item, index) => {
      const itemTotal = item.price * item.quantity;
      grandTotal += itemTotal;

      listDiv.innerHTML += `
        <div class="cart-item">
          <div class="item-info">
            <h3>${item.name}</h3>
            <p>₹${item.price}</p>
          </div>
          <div class="quantity-controls">
            <div>
                <button class="btn-qty" onclick="changeQty(${index}, -1)">-</button>
                <span style="margin: 0 10px; font-weight:600;">${item.quantity}</span>
                <button class="btn-qty" onclick="changeQty(${index}, 1)">+</button>
            </div>
            <strong>₹${itemTotal}</strong>
          </div>
        </div>
      `;
    });
    totalSpan.innerText = grandTotal;
  }

  // --- 2. UPDATE QUANTITY ---
  function changeQty(index, delta) {
    let cart = JSON.parse(localStorage.getItem('juiceCart')) || [];
    cart[index].quantity += delta;
    
    // Remove item if quantity drops to 0
    if (cart[index].quantity <= 0) {
      cart.splice(index, 1);
    }
    
    localStorage.setItem('juiceCart', JSON.stringify(cart));
    renderCart();
  }

  // --- 3. PLACE ORDER (WITH LOGIN GUARD) ---
  function placeOrder() {
    let cart = JSON.parse(localStorage.getItem('juiceCart')) || [];
    
    // Check if cart is empty
    if (cart.length === 0) {
      alert("Your cart is empty! Add some juice first.");
      return;
    }

    // Check Login Status
    let loginStatus = localStorage.getItem('isLoggedIn');
    
    if (loginStatus !== 'true') {
      alert("You must be logged in to place an order.");
      window.location.href = "login.html"; 
      return;
    }

    // Show Payment Modal if logged in
    document.getElementById('payment-modal').style.display = 'flex';
  }

  function closePayment() {
    document.getElementById('payment-modal').style.display = 'none';
  }

  function confirmFinalOrder() {
    const methods = document.getElementsByName('pay-method');
    let selected = "";
    for (const m of methods) { 
      if (m.checked) selected = m.value; 
    }

    alert(`Order Placed Successfully via ${selected}! Thank you for choosing The Juice Theory.`);
    
    localStorage.removeItem('juiceCart'); // Clear the cart after purchase
    window.location.href = "index.html"; // Redirect to main page
  }

  // Ensure cart renders immediately on page load
  window.onload = renderCart;
</script>

</body>
</html>
