<!DOCTYPE html>
<html>
<head>

  <style>
   body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #e0c3fc, #f9c5d1, #a1c4fd);
  min-height: 100vh;
  color: black;
}

/* 🔝 HEADER (same as Juices page) */
#top {
  position: sticky;
  top: 0;
  z-index: 1000;

  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 40px;

  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.95),
    rgba(255,255,255,0.75)
  );
  backdrop-filter: blur(14px);

  border-bottom: 3px solid #507d2a;

  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

.header-left, .header-right {
  flex: 1;
  display: flex;
  align-items: center;
}

.header-right {
  justify-content: flex-end;
  gap: 20px;
}

.header-center {
  flex: 2;
  text-align: center;
}

.header-center h2 {
      margin: 0;
      font-size: 2.2rem;
      color: #507d2a;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 500;
    }


/* CART */
.cart-link {
  text-decoration: none;
  color: #507d2a;
  font-weight: bold;
}

#cart-count {
  background: #8db600;
  color: white;
  padding: 2px 8px;
  border-radius: 50%;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 30px;
  padding: 40px;
}

/* ✨ MODERN CARD */
.card {
  position: relative;
  border-radius: 20px;
  overflow: hidden;

  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.3);

  transition: all 0.4s ease;
}

.card:hover {
  transform: translateY(-12px) scale(1.02);
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

.card img {
  width: 100%;
  height: 420px;
  object-fit: cover;
  transition: 0.5s ease;
}

.card:hover img {
  transform: scale(1.1);
}

/* 🌫️ SMOOTH OVERLAY */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 20px;
  text-align: center;

  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}

.overlay h3 {
  margin: 0 0 10px 0;
  color: white;
}

/* BUTTON */
.add-btn {
  background: linear-gradient(135deg, #507d2a, #8db600);
  color: white;
  border: none;
  padding: 8px 18px;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

    /* Changed # to . to match your HTML class */
.home-btn {
  display: inline-block;
  text-decoration: none; /* Removes the underline from the link */
  padding: 12px 25px;
  background: linear-gradient(135deg, #4f7942, #8fbc8f);
  border: none;
  border-radius: 25px;
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s ease;
}

.home-btn:hover {
  transform: scale(1.08);
  background: linear-gradient(135deg, #3d5f33, #6fa46f);
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}


.add-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 5px 20px rgba(141,182,0,0.6);
}
  </style>
</head>

<body>

<script>
    function addToCart(name, price) {
        let cart = JSON.parse(localStorage.getItem('juiceCart')) || [];
        
        const existingItem = cart.find(item => item.name === name);

        if (existingItem) {
            existingItem.quantity += 1;
        } else {
            cart.push({ name: name, price: price, quantity: 1 });
        }

        localStorage.setItem('juiceCart', JSON.stringify(cart));
        updateCartCount();
        alert(name + " added to your cart!");
    }

    function updateCartCount() {
        let cart = JSON.parse(localStorage.getItem('juiceCart')) || [];
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        document.getElementById('cart-count').innerText = totalItems;
    }

    // Initialize count on load
    updateCartCount();
</script>
