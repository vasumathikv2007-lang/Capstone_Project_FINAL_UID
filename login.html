<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      /* Ensure background covers the whole screen on mobile */
      background: url("login.jpg") no-repeat center center/cover;
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .box {
      position: relative;
      z-index: 1;
      background: #ffffff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      
      /* RESPONSIVE WIDTH: 90% of screen on mobile, max 350px on desktop */
      width: 90%;
      max-width: 350px;
      
      text-align: center;
    }

    h2 {
      color: #2e7d32;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #a5d6a7;
      /* Font size 16px prevents iOS from auto-zooming on focus */
      font-size: 16px; 
    }

    input:focus {
      border-color: #4f7942;
      box-shadow: 0 0 6px rgba(79,121,66,0.5);
      outline: none;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 15px;
      padding: 14px;
      background: linear-gradient(135deg, #4f7942, #81c784);
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      border: none;
    }

    /* Remove hover scale on mobile to avoid "sticky" touch states */
    @media (min-width: 768px) {
      .btn:hover {
        transform: scale(1.03);
      }
    }

    .error {
      font-size: 13px;
      margin-top: 5px;
      min-height: 18px;
      font-weight: 500;
    }

  </style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <div id="error" class="error"></div>

  <a href="register.html" class="btn" onclick="return validate(event)">Next</a>
</div>

<script>
function validate(event) {
  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value;
  let error = document.getElementById("error");

  // Regex: 8+ chars, Uppercase, Lowercase, Number, Special Char
  let pattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

  if (email === "" || password === "") {
    error.style.color = "red";
    error.innerText = "All fields are required!";
    event.preventDefault();
    return false;
  }

  if (!/^\S+@\S+\.\S+$/.test(email)) {
    error.style.color = "red";
    error.innerText = "Please enter a valid email!";
    event.preventDefault();
    return false;
  }<!DOCTYPE html>

        /* Responsive Background */
        .bg-container {

        /* Responsive Login Card */

            text-align: center;
            /* Mobile First Width */
            width: 85%; 
            max-width: 350px; 
        }

        h2 {
            color: #2d5a27;
            margin-bottom: 25px;
            font-size: 24px;
        }

        input {
            width: 100%;
            padding: 12px;

            border-radius: 5px;
            box-sizing: border-box; /* Prevents input from sticking out */

        }

        button {
            width: 100%;
            padding: 12px;

<body>

<div class="bg-container">
    <div class="login-card">
        <h2>Login</h2>
        <form>
            <input type="email" placeholder="Enter Email" required>
            <input type="password" placeholder="Enter Password" required>
            <button type="submit">Next</button>
        </form>
    </div>
</div>

  if (!pattern.test(password)) {
    error.style.color = "red";
    error.innerText = "Weak password! Need 8+ chars, upper, lower, & symbol.";
    event.preventDefault();
    return false;
  }

  error.style.color = "green";
  error.innerText = "Login Successful!";
  // In a real app, you'd let the event proceed or redirect via JS
  return true; 
}
</script>

</body>
</html>
