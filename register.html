<!DOCTYPE html>
<html>
<head>
  <title>Register - The Juice Theory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      /* Background covers the whole screen */
      background: url("register.jpg") no-repeat center center/cover;
      padding: 20px; /* Prevents box from touching edges on tiny screens */
    }

    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5); /* Slightly darker for better contrast */
      z-index: 0;
    }

    .box {
      position: relative;
      z-index: 1;
      background: #ffffff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      width: 100%; /* Responsive width */
      max-width: 380px; /* Limits size on desktop */
      text-align: center;
    }

    h2 {
      color: #2e7d32;
      margin-bottom: 15px;
      font-size: 24px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #a5d6a7;
      outline: none;
      font-size: 16px; /* 16px prevents iOS zoom on focus */
    }

    textarea {
      resize: none;
      height: 80px;
    }

    input:focus, textarea:focus {
      border-color: #4f7942;
      box-shadow: 0 0 6px rgba(79,121,66,0.5);
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      background: linear-gradient(135deg, #4f7942, #81c784);
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.02);
      background: linear-gradient(135deg, #3d5f33, #66bb6a);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .error {
      font-size: 13px;
      margin: 8px 0;
      min-height: 18px;
      font-weight: bold;
    }

    /* 📱 MOBILE RESPONSIVENESS */
    @media (max-width: 480px) {
      .box {
        padding: 20px;
      }
      h2 {
        font-size: 20px;
      }
      button {
        padding: 12px;
      }
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Welcome</h2>

  <input type="text" id="name" placeholder="Enter Name">
  <input type="number" id="age" placeholder="Enter Age">
  <textarea id="address" placeholder="Enter Address"></textarea>

  <div id="error" class="error"></div>

  <button onclick="validate()">Register</button>
</div>

<script>
function validate() {
  let name = document.getElementById("name").value.trim();
  let age = document.getElementById("age").value;
  let address = document.getElementById("address").value.trim();
  let error = document.getElementById("error");

  if (name === "" || age === "" || address === "") {
    error.style.color = "red";
    error.innerText = "All fields are required!";
    return;
  }

  if (age < 18) {
    error.style.color = "red";
    error.innerText = "Age must be 18 or above!";
    return;
  }

  // ✅ SAVE NAME
  localStorage.setItem("username", name);

  error.style.color = "green";
  error.innerText = "Registration Successful!";

  setTimeout(() => {
    window.location.href = "index.html";
  }, 1000);
}
</script>

</body>
</html>
